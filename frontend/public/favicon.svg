<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="64" height="64" rx="14" fill="white" fill-opacity="0.07"/>

  <!-- Gear / precision_manufacturing icon (centered, 40x40) -->
  <!-- Outer gear ring with teeth -->
  <g transform="translate(32,32)">
    <!-- Gear teeth (8 teeth) -->
    <g fill="url(#gear)">
      <rect x="-4" y="-20" width="8" height="6" rx="2"/>
      <rect x="-4" y="14"  width="8" height="6" rx="2"/>
      <rect x="14" y="-4"  width="6" height="8" rx="2"/>
      <rect x="-20" y="-4" width="6" height="8" rx="2"/>
      <!-- Diagonal teeth -->
      <rect x="8.5"  y="-19.5" width="8" height="6" rx="2" transform="rotate(45)"/>
      <rect x="8.5"  y="13.5"  width="8" height="6" rx="2" transform="rotate(-45)"/>
      <rect x="-19.5" y="8.5"  width="8" height="6" rx="2" transform="rotate(45)"/>
      <rect x="-19.5" y="-19.5" width="8" height="6" rx="2" transform="rotate(-45)"/>
    </g>
    <!-- Outer ring -->
    <circle r="14" fill="none" stroke="url(#gear)" stroke-width="4"/>
    <!-- Inner circle (hub) -->
    <circle r="5.5" fill="url(#gear)"/>
    <!-- Center dot -->
    <circle r="2.5" fill="url(#bg)"/>
  </g>

  <!-- Small checkmark badge bottom-right -->
  <circle cx="49" cy="49" r="9" fill="#10B981"/>
  <polyline points="44.5,49.5 47.5,52.5 53,46" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
